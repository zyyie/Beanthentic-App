<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Beanthentic Coffee</title>
  <link rel="stylesheet" href="android-app/app/src/main/assets/css/base.css">
  <link rel="stylesheet" href="android-app/app/src/main/assets/css/layout.css">
  <link rel="stylesheet" href="android-app/app/src/main/assets/css/components.css">
  <link rel="stylesheet" href="android-app/app/src/main/assets/css/responsive.css">
</head>
<body>
  <button type="button" id="nav-mobile-overlay" class="nav-mobile-overlay" hidden aria-hidden="true" tabindex="-1"></button>
  <header>
    <div class="nav">
      <a href="index.html" class="logo" aria-label="Beanthentic home">
        <img class="logo-mark" src="android-app/app/src/main/assets/beantHentic_logo.png" alt="Beanthentic logo" />
        <span>BEANTHENTIC</span>
      </a>
      <button
        type="button"
        id="nav-menu-toggle"
        class="nav-menu-toggle"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="main-nav-links"
      >
        <span class="nav-menu-toggle-line" aria-hidden="true"></span>
        <span class="nav-menu-toggle-line" aria-hidden="true"></span>
        <span class="nav-menu-toggle-line" aria-hidden="true"></span>
      </button>
      <nav class="nav-links" id="main-nav-links">
        <a href="index.html#home" data-no-loader="true">Home</a>
        <a href="login.html" data-no-loader="true" aria-current="page">Login</a>
        <a href="signup.html" data-no-loader="true">Sign up</a>
      </nav>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Sign in</h1>
      <p class="auth-lead">Welcome back. Enter your account details.</p>
      <form class="auth-form" method="post" action="#" autocomplete="on">
        <label for="login-email">Email</label>
        <input id="login-email" name="email" type="email" required autocomplete="email" placeholder="you@example.com" />

        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••" />

        <button type="submit" class="btn-primary">Sign in</button>
      </form>
      <p class="auth-switch">Need an account? <a href="signup.html">Sign up</a></p>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <span><span class="footer-dot"></span> Beanthentic &copy; <span id="year">2026</span> · Brewed with care.</span>
      <span>Serving honest coffee, one cup at a time.</span>
    </div>
  </footer>

  <script src="android-app/app/src/main/assets/js/navigation.js"></script>
  <script src="android-app/app/src/main/assets/js/ui.js"></script>
</body>
</html>
