  <script>
    (function () {
      var varietyFilter = 'all';
      var periodFilter = null;
      var listRoot = document.getElementById('txn-list-root');
      var emptyEl = document.getElementById('txn-list-empty');
      var listView = document.getElementById('txn-history-list-view');
      var receiptView = document.getElementById('txn-history-receipt-view');
      var headerTitle = document.getElementById('txn-header-title');
      var receiptBack = null;

      function varietyFromRecord(r) {
        var v = (r && r.variety ? String(r.variety) : '').toLowerCase();
        if (v === 'liberica' || v === 'robusta' || v === 'excelsa') return v;
        var p = (r && r.product ? String(r.product) : '').toLowerCase();
        if (p.indexOf('liberica') >= 0) return 'liberica';
        if (p.indexOf('robusta') >= 0) return 'robusta';
        if (p.indexOf('excelsa') >= 0) return 'excelsa';
        return '';
      }

      function passesFilters(r) {
        if (varietyFilter !== 'all') {
          if (varietyFromRecord(r) !== varietyFilter) return false;
        }
        if (periodFilter === 'month') {
          var d = new Date(r.at);
          var n = new Date();
          if (isNaN(d.getTime()) || d.getFullYear() !== n.getFullYear() || d.getMonth() !== n.getMonth()) return false;
        }
        if (periodFilter === 'year') {
          var d2 = new Date(r.at);
          if (isNaN(d2.getTime()) || d2.getFullYear() !== new Date().getFullYear()) return false;
        }
        return true;
      }

      function arrowSvg(isAccent) {
        var ns = 'http://www.w3.org/2000/svg';
        var svg = document.createElementNS(ns, 'svg');
        svg.setAttribute('class', 'txn-item-arrow' + (isAccent ? ' txn-item-arrow--accent' : ''));
        svg.setAttribute('viewBox', '0 0 24 24');
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor');
        svg.setAttribute('stroke-width', '2.1');
        svg.setAttribute('stroke-linecap', 'round');
        svg.setAttribute('stroke-linejoin', 'round');
        svg.setAttribute('aria-hidden', 'true');
        var p1 = document.createElementNS(ns, 'path');
        p1.setAttribute('d', 'M4 20 20 4');
        var p2 = document.createElementNS(ns, 'path');
        p2.setAttribute('d', 'M8 4h12v12');
        svg.appendChild(p1);
        svg.appendChild(p2);
        return svg;
      }

      function moneyLike(v) {
        var n = Number(v);
        if (!isFinite(n)) return '-';
        return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function firstNumber(obj, keys) {
        for (var i = 0; i < keys.length; i++) {
          var v = obj ? obj[keys[i]] : null;
          var n = Number(v);
          if (isFinite(n)) return n;
        }
        return null;
      }

      function firstText(obj, keys) {
        for (var i = 0; i < keys.length; i++) {
          var v = obj ? obj[keys[i]] : '';
          if (v != null && String(v).trim() !== '') return String(v).trim();
        }
        return '';
      }

      function showListView() {
        if (listView) listView.hidden = false;
        if (receiptView) receiptView.hidden = true;
        if (headerTitle) headerTitle.textContent = 'Transaction History';
      }

      function showReceiptView(r) {
        if (!r || !receiptView || !listView) return;
        listView.hidden = true;
        receiptView.hidden = false;
        if (headerTitle) headerTitle.textContent = 'Receipt History';
        var amountNum = firstNumber(r, ['amount', 'totalAmount', 'amountValue']);
        var paymentAmtNum = firstNumber(r, ['paymentAmount', 'paidAmount', 'payment_value']);
        var totalNum = firstNumber(r, ['total', 'amount', 'totalAmount']);
        var changeNum = firstNumber(r, ['change', 'changeAmount']);
        var paymentText = firstText(r, ['payment', 'paymentMethod', 'modeOfPayment']);
        document.getElementById('hist-receipt-buyer').textContent = r.buyer || '-';
        document.getElementById('hist-receipt-product').textContent = r.product || '-';
        document.getElementById('hist-receipt-qty').textContent =
          (r.qty != null && String(r.qty) !== '' ? String(r.qty) : '-') + (r.unit ? String(r.unit).toUpperCase() : '');
        document.getElementById('hist-receipt-amount').textContent = amountNum == null ? '0.00' : moneyLike(amountNum);
        document.getElementById('hist-receipt-payment').textContent = paymentText || 'Cash';
        document.getElementById('hist-receipt-payment-amount').textContent =
          paymentAmtNum == null ? '0.00' : moneyLike(paymentAmtNum);
        document.getElementById('hist-receipt-total').textContent = totalNum == null ? '0.00' : moneyLike(totalNum);
        document.getElementById('hist-receipt-change').textContent = changeNum == null ? '0.00' : moneyLike(changeNum);
        document.getElementById('hist-receipt-ref').textContent = r.ref || '-';
        var d = new Date(r.at);
        document.getElementById('hist-receipt-date').textContent = isNaN(d.getTime()) ? '-' : d.toLocaleString();
      }

      function renderList() {
        if (!listRoot || !emptyEl) return;
        showListView();
        var all = window.BeanthenticTxnHistory ? window.BeanthenticTxnHistory.load() : [];
        var filtered = all.filter(passesFilters);
        listRoot.innerHTML = '';
        if (filtered.length === 0) {
          emptyEl.hidden = false;
          if (all.length === 0) {
            emptyEl.textContent =
              'No transactions yet. Complete a transaction in Transaction (QR) and confirm the receipt to save it here.';
          } else {
            emptyEl.textContent = 'No transactions match these filters. Try All or a different time range.';
          }
          return;
        }
        emptyEl.hidden = true;
        filtered.forEach(function (r, i) {
          var art = document.createElement('article');
          art.className = 'txn-item';
          art.setAttribute('tabindex', '0');
          art.setAttribute('role', 'button');
          art.setAttribute('aria-label', 'Open receipt ' + (r.ref || ''));
          art.appendChild(arrowSvg(i % 2 === 1));
          var main = document.createElement('div');
          main.className = 'txn-item-main';
          var to = document.createElement('p');
          to.className = 'txn-item-to';
          to.textContent = 'To: ' + (r.buyer || '—');
          var refp = document.createElement('p');
          refp.className = 'txn-item-ref';
          refp.textContent = 'Ref. No. ' + (r.ref || '—');
          main.appendChild(to);
          main.appendChild(refp);
          var qty = document.createElement('div');
          qty.className = 'txn-item-qty';
          var unit = r.unit ? String(r.unit).toUpperCase() : '';
          qty.textContent = (r.qty != null && String(r.qty) !== '' ? String(r.qty) : '—') + unit;
          art.appendChild(main);
          art.appendChild(qty);
          art.addEventListener('click', function () { showReceiptView(r); });
          art.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              showReceiptView(r);
            }
          });
          listRoot.appendChild(art);
        });
      }

      document.querySelectorAll('.txn-chip').forEach(function (btn) {
        btn.addEventListener('click', function () {
          varietyFilter = btn.getAttribute('data-variety') || 'all';
          document.querySelectorAll('.txn-chip').forEach(function (b) {
            b.classList.remove('is-active');
          });
          btn.classList.add('is-active');
          renderList();
        });
      });

      document.querySelectorAll('.txn-period').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var p = btn.getAttribute('data-period');
          if (periodFilter === p) {
            periodFilter = null;
            btn.classList.remove('is-active');
          } else {
            periodFilter = p;
            document.querySelectorAll('.txn-period').forEach(function (b) {
              b.classList.remove('is-active');
            });
            btn.classList.add('is-active');
          }
          renderList();
        });
      });

      var headerBackBtn = document.getElementById('txn-header-back');
      if (headerBackBtn) {
        headerBackBtn.addEventListener('click', function () {
          if (receiptView && !receiptView.hidden) {
            showListView();
            return;
          }
          try {
            if (window.history.length > 1) {
              window.history.back();
              return;
            }
          } catch (_e) {}
          window.location.href = 'qr.php';
        });
      }

      window.addEventListener('pageshow', renderList);
      window.addEventListener('storage', function (e) {
        if (e.key === (window.BeanthenticTxnHistory && window.BeanthenticTxnHistory.KEY)) renderList();
      });
      renderList();
    })();
  </script>
  <script>
    (function () {
      function flaskBase() {
        try {
          var s = localStorage.getItem('beanthentic_flask_base');
          if (s && String(s).replace(/\s/g, '')) {
            s = String(s).replace(/\/$/, '');
            // If a stale LAN IP was saved, reset to emulator-safe default.
            if (/^https?:\/\/192\.168\./i.test(s)) {
              try { localStorage.removeItem('beanthentic_flask_base'); } catch (_e) {}
            } else {
              return s;
            }
          }
        } catch (e) {}
        if (typeof location !== 'undefined' && (location.protocol === 'http:' || location.protocol === 'https:')) {
          return (location.origin || '').replace(/\/$/, '');
        }
        return 'http://10.0.2.2:5000';
      }
      var b = flaskBase();
      document.querySelectorAll('a[data-beanthentic-flask]').forEach(function (a) {
        var p = a.getAttribute('data-beanthentic-flask');
        if (p) a.setAttribute('href', b + p);
      });
    })();
  </script>
