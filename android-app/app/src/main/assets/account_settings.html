    .account-settings-label {

              <a href="settings.php?from=account_settings&amp;section=general" data-settings-section="general">
                <svg class="account-settings-submenu-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M4 7.1h9.8v1.7H4V7.1zm0 4.6h6.6v1.7H4v-1.7zm0 4.6h4.2v1.7H4v-1.7z" />
                  <circle cx="17.2" cy="7.9" r="2.1" />

                  <circle cx="19" cy="16.3" r="2.1" />

          <a class="account-settings-item-link" href="help.html?from=account_settings" data-nav-key="help">

  <script src="js/beanthentic_api_urls.js"></script>
  <script src="js/beanthentic_profile_store.js"></script>
  <script>
    (function () {
      function parseUser(raw) {
        if (!raw) return null;
        try {
          var u = JSON.parse(raw);
          return u && typeof u === 'object' ? u : null;
        } catch (_e) {
          return null;
        }
      }
      function getUser() {
        var local = null;
        var session = null;
        try { local = parseUser(localStorage.getItem('beanthentic_user')); } catch (_e1) { }
        try { session = parseUser(sessionStorage.getItem('beanthentic_user')); } catch (_e2) { }
        return local || session || null;
      }
      function keyVariants(v) {
        var out = [];
        var k = String(v || '').trim().toLowerCase();
        if (!k) return out;
        out.push(k);
        var d = k.replace(/\D/g, '');
        if (d) {
          if (d.indexOf('63') === 0 && d.length >= 12) out.push('0' + d.slice(2));
          if (d.indexOf('0') === 0 && d.length >= 11) out.push('+63' + d.slice(1));
          if (d.length === 10 && d.charAt(0) === '9') {
            out.push('0' + d);
            out.push('+63' + d);
          }
        }
        return Array.from(new Set(out));
      }
      function getFarmerProfile(email) {
        if (window.BeanthenticProfileStore && window.BeanthenticProfileStore.getFarmerProfile) {
          return window.BeanthenticProfileStore.getFarmerProfile(email) || {};
        }
        return {};
      }
      function initials(name) {
        var parts = String(name || '').trim().split(/\s+/).filter(Boolean);
        if (parts.length >= 2) return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
        if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
        return 'BA';
      }
      function formatPhone(raw) {
        var s = String(raw || '').replace(/[\s-]/g, '').trim();
        if (!s) return '(+63) XXXX XXX XX';
        if (s.indexOf('+63') === 0) return s.replace(/^\+63(\d{3})(\d{3})(\d+)$/, '(+63) $1 $2 $3');
        if (s.indexOf('09') === 0 && s.length === 11) return '(+63) ' + s.slice(1, 4) + ' ' + s.slice(4, 7) + ' ' + s.slice(7);
        return s;
      }
      var u = getUser() || {};
      var email = String(u.email || '').trim().toLowerCase();
      var p = getFarmerProfile(email) || {};
      var name = String((p.name || '') || [p.first_name, p.last_name].filter(Boolean).join(' ') || u.name || '').trim();
      if (u.needs_registration) {
        name = 'Member';
      } else if (!name) {
        name = email ? email.split('@')[0] : 'Member';
      }
      var phone = String((p.phone || '') || (u.phone || '') || (u.mobile || '')).trim();
      var nameEl = document.getElementById('account-settings-name');
      var phoneEl = document.getElementById('account-settings-phone');
      var iniEl = document.getElementById('account-settings-initials');
      if (nameEl) nameEl.textContent = name;
      if (phoneEl) phoneEl.textContent = formatPhone(phone);
      function paintProfile() {
        var prof = getFarmerProfile(email) || {};
        var displayName = String((prof.name || '') || [prof.first_name, prof.last_name].filter(Boolean).join(' ') || name || '').trim();
        if (u.needs_registration) displayName = 'Member';
        if (nameEl) nameEl.textContent = displayName;
        if (phoneEl) phoneEl.textContent = formatPhone(String((prof.phone || '') || phone || '').trim());
        if (window.BeanthenticProfileStore && window.BeanthenticProfileStore.applyAvatar) {
          window.BeanthenticProfileStore.applyAvatar({
            profile: prof,
            imgEl: document.getElementById('account-settings-photo'),
            wrapEl: document.getElementById('account-settings-avatar-wrap'),
            initialsEl: iniEl,
            name: displayName,
          });
        }
      }
      paintProfile();

      var avatarBtn = document.getElementById('account-settings-avatar-btn');
      var photoInput = document.getElementById('account-settings-photo-input');
      var photoStatus = document.getElementById('account-settings-photo-status');
      if (avatarBtn && photoInput) {
        avatarBtn.addEventListener('click', function () {
          photoInput.click();
        });
        photoInput.addEventListener('change', function () {
          var file = photoInput.files && photoInput.files[0];
          photoInput.value = '';
          if (!file || !window.BeanthenticProfileStore) return;
          if (photoStatus) photoStatus.textContent = 'Saving photo…';
          avatarBtn.classList.add('is-saving');
          window.BeanthenticProfileStore.readFileAsDataUrl(file)
            .then(function (dataUrl) {
              return window.BeanthenticProfileStore.updateProfilePhoto(dataUrl);
            })
            .then(function () {
              paintProfile();
              if (photoStatus) photoStatus.textContent = 'Profile photo updated.';
            })
            .catch(function (err) {
              if (photoStatus) {
                photoStatus.textContent = (err && err.message) ? err.message : 'Could not update photo.';
              }
            })
            .finally(function () {
              avatarBtn.classList.remove('is-saving');
            });
        });
      }
      window.addEventListener('beanthentic-profile-changed', function () {
        paintProfile();
      });

      var dropdownWrap = document.getElementById('account-settings-dropdown');
      var securityWrap = document.getElementById('account-settings-security-dropdown');
      if (dropdownWrap) {
        document.addEventListener('click', function (e) {
          var inSettings = dropdownWrap.contains(e.target);
          var inSecurity = securityWrap && securityWrap.contains(e.target);
          if (!inSettings && !inSecurity) {
            if (typeof window.openAccountSettingsDropdown === 'function') {
              window.openAccountSettingsDropdown(false);
            }
            if (typeof window.openSecurityNestedDropdown === 'function') {
              window.openSecurityNestedDropdown(false);
            }
          }
        });
      }

      var logoutBtn = document.getElementById('account-settings-logout');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function () {
          try {
            localStorage.removeItem('beanthentic_user');
            sessionStorage.removeItem('beanthentic_user');
          } catch (_e) { }
          try {
            window.location.assign('index.php#home');
          } catch (_e2) {
            window.location.href = 'index.php#home';
          }
        });
      }
    })();
  </script>
  <script src="js/auth_lang.js"></script>
  <script src="js/ui.js"></script>
